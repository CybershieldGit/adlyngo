name: Deploy

# Auto-deploy: runs on every push to main (including when a PR is merged).
on:
  push:
    branches: [main]

concurrency:
  group: backend-deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      MONGODB_URI: mongodb://127.0.0.1:27017/ci
      JWT_SECRET: ci-build-placeholder-secret-minimum-32-chars
      COOKIE_SECRET: ci-build-placeholder-secret-minimum-32-chars
      UPLOAD_BASE_URL: https://www.adlyngo.com/uploads
      UPLOAD_DIR_IMAGES: /tmp/adlyngo-uploads/images
      UPLOAD_DIR_VIDEOS: /tmp/adlyngo-uploads/videos
      CLIENT_URL: http://localhost:3000
      PORT: 3001
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

  deploy:
    needs: build
    environment: production
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - name: Validate SSH key secret
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          if [ -z "$SSH_PRIVATE_KEY" ]; then
            echo "::error::VPS_SSH_KEY is empty. Add the full private key in Settings → Secrets (Repository or Production environment)."
            exit 1
          fi
          install -m 700 -d ~/.ssh
          printf '%s' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          if ! ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null 2>&1; then
            echo "::error::VPS_SSH_KEY is invalid. Paste the FULL private key (starts with -----BEGIN OPENSSH PRIVATE KEY----- or -----BEGIN RSA PRIVATE KEY-----)."
            exit 1
          fi

      - name: Deploy to Hostinger VPS
        env:
          VPS_BACKEND_PATH: ${{ secrets.VPS_BACKEND_PATH }}
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key_path: ~/.ssh/deploy_key
          port: 22
          command_timeout: 15m
          envs: VPS_BACKEND_PATH
          script: |
            set -euo pipefail
            cd "${VPS_BACKEND_PATH:-/www/wwwroot/backend}"
            export DEPLOY_BRANCH=main
            bash scripts/deploy.sh
